services:
  - type: web
    name: quickads-instagram-reachout
    # Docker runtime (see Dockerfile). Uses Playwright's official image, which
    # bundles Chromium + all required system libraries, so the "headless login"
    # connect method works — Render's native Node runtime lacks those libs.
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Persistent disks require a paid instance type. 'starter' is the lowest
    # paid tier that supports a disk — change to your actual paid plan.
    plan: starter
    envVars:
      - key: APIFY_TOKEN
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      # Optional: paste the Instagram cookies JSON array here as a single
      # env var so it survives Render cold starts / redeploys (the data/
      # folder is ephemeral on the free tier).
      - key: INSTAGRAM_COOKIES
        sync: false
      # Optional: set a password to lock the whole app behind HTTP Basic
      # auth. Leave unset to keep the app open (current behavior).
      - key: APP_PASSWORD
        sync: false
      # Points the app's JSON storage at the persistent disk mounted below
      # so campaigns, negotiations and the ready list survive redeploys and
      # restarts. MUST match the disk mountPath.
      - key: DATA_DIR
        value: /var/data
      # Node version comes from the Docker base image, not NODE_VERSION.
    # Persistent disk — without this, the filesystem is wiped on every
    # deploy/restart (the cause of the disappearing campaigns).
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
